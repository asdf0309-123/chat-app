<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0f172a;
      --panel:#111827;
      --border:#1f2937;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#4f46e5;
    }

    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family: Inter, system-ui, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .overlay {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:rgba(2,6,23,0.9);
      z-index:10;
    }

    .loginBox {
      background:var(--panel);
      border:1px solid var(--border);
      padding:24px;
      border-radius:10px;
      display:flex; gap:10px; flex-direction:column; width:280px;
    }

    .loginBox input {
      background:#020617; border:1px solid var(--border); border-radius:8px;
      padding:12px; color:var(--text); outline:none;
    }

    .loginBox button {
      background:var(--accent); border:none; border-radius:8px; padding:12px; color:#fff; cursor:pointer;
    }

    .app { display:flex; height:100vh; }

    .sidebar {
      width:200px;
      background:var(--panel);
      border-right:1px solid var(--border);
      padding:16px;
    }

    .chat { flex:1; display:flex; flex-direction:column; }

    .header {
      padding:16px;
      border-bottom:1px solid var(--border);
      background:var(--panel);
      font-weight:600;
    }

    .messages {
      flex:1;
      overflow:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .msg {
      max-width:60%;
      padding:10px 14px;
      border-radius:12px;
      background:#1f2937;
    }

    .msg.user {
      align-self:flex-end;
      background:var(--accent);
    }

    .msg.other {
      align-self:flex-start;
      background:#1f2937;
    }

    /* system message style */
    .msg.system {
      align-self:center;
      background:transparent;
      color:var(--muted);
      font-size:12px;
    }

    .name {
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .inputBar {
      display:flex;
      border-top:1px solid var(--border);
      background:var(--panel);
      padding:10px;
      gap:8px;
    }

    .username {
      width:140px;
      background:#020617;
      border:1px solid var(--border);
      border-radius:8px;
      padding:12px;
      color:var(--text);
      outline:none;
    }

    .inputBar input {
      flex:1;
      background:#020617;
      border:1px solid var(--border);
      border-radius:8px;
      padding:12px;
      color:var(--text);
      outline:none;
    }

    .inputBar button {
      background:var(--accent);
      border:none;
      padding:0 16px;
      border-radius:8px;
      color:white;
      cursor:pointer;
    }

    .inputBar button:hover { opacity:0.9; }
  </style>
</head>
<body>

  <div class="app">

    <aside class="sidebar">
      <h3>Online</h3>
      <div id="userLabel">-</div>
      <div id="rouletteBtn" style="margin-top:10px; cursor:pointer; color:#4f46e5;">
        🎰 룰렛
      </div>
    </aside>

    <main class="chat">
      <div class="header">CHAT</div>

      <div class="messages" id="messages"></div>

      <div class="inputBar">
        <input id="input" placeholder="message..." />
        <button onclick="send()">SEND</button>
      </div>
    </main>

  </div>

  <div class="overlay" id="overlay">
    <div class="loginBox">
      <div>ENTER USERNAME</div>
      <input id="loginName" placeholder="username" />
      <button onclick="enter()">ENTER</button>
    </div>
  </div>

  <script>
    const socket = io();
    let currentUser = '';

    function enter() {
      const val = document.getElementById('loginName').value.trim();
      if (!val) return;
      currentUser = val;
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('userLabel').textContent = val;
      socket.emit('join', currentUser);
    }

    function send() {
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');
      if (!input.value.trim()) return;

      const name = currentUser || 'anon';

      socket.emit('chat message', { username: name, text: input.value });
      input.value = '';
      messages.scrollTop = messages.scrollHeight;
    }

    function addMessage(data) {
      const messages = document.getElementById('messages');

      const el = document.createElement('div');
      // fallback to avoid empty usernames breaking UI
      const username = data.username || data.name || 'anon';
      el.className = username === currentUser ? 'msg user' : 'msg other';

      const nameEl = document.createElement('div');
      nameEl.className = 'name';
      nameEl.textContent = username;

      const textEl = document.createElement('div');
      textEl.textContent = data.text || '';

      el.appendChild(nameEl);
      el.appendChild(textEl);

      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    }

    // load history
    socket.on('load messages', (list) => {
      const messages = document.getElementById('messages');
      messages.innerHTML = '';
      // normalize DB rows to UI shape with fallbacks
      list.forEach((msg) => {
        addMessage({
          username: msg.username || 'anon',
          text: msg.text || ''
        });
      });
    });

    // realtime
    socket.on('chat message', (data) => {
      addMessage(data);
    });

    socket.on('system', (text) => {
      const messages = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'msg system';
      el.textContent = text;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    });

    socket.on('users', (list) => {
      document.getElementById('userLabel').textContent = list.join(', ');
    });

    // Enter to send
    document.getElementById('input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        send();
      }
    });

    // Enter key for login
    document.getElementById('loginName').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') enter();
    });

    // ===== Roulette Feature =====
    document.getElementById('rouletteBtn').onclick = () => {
      openRoulette();
    };

    function openRoulette() {
      const messages = document.getElementById('messages');

      const box = document.createElement('div');
      box.className = 'msg system';

      box.innerHTML = `
        <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
          <div>룰렛 항목 (쉼표로 구분)</div>
          <input id="rouletteInput" placeholder="예: 치킨, 피자, 햄버거" />
          <canvas id="rouletteCanvas" width="220" height="220"></canvas>
          <button onclick="startRoulette()">START</button>
          <div id="rouletteResult"></div>
        </div>
      `;

      messages.appendChild(box);
      messages.scrollTop = messages.scrollHeight;
    }

    function startRoulette() {
      const inputEl = document.getElementById('rouletteInput');
      if (!inputEl) return;
      const items = inputEl.value.split(',').map(v => v.trim()).filter(v => v);
      if (items.length === 0) return;

      const canvas = document.getElementById('rouletteCanvas');
      const ctx = canvas.getContext('2d');
      const resultEl = document.getElementById('rouletteResult');

      const colors = ['#4f46e5','#22c55e','#eab308','#ef4444','#06b6d4','#a855f7'];
      let angle = 0;
      let speed = 0.35;
      let spinning = true;

      function draw() {
        const slice = (2 * Math.PI) / items.length;
        ctx.clearRect(0,0,220,220);

        items.forEach((item, i) => {
          const start = angle + i * slice;
          const end = start + slice;

          ctx.beginPath();
          ctx.moveTo(110,110);
          ctx.arc(110,110,110,start,end);
          ctx.fillStyle = colors[i % colors.length];
          ctx.fill();

          ctx.save();
          ctx.translate(110,110);
          ctx.rotate(start + slice/2);
          ctx.fillStyle = '#fff';
          ctx.font = '12px sans-serif';
          ctx.fillText(item, 60, 5);
          ctx.restore();
        });

        // pointer (downward)
        ctx.beginPath();
        ctx.moveTo(110,220);
        ctx.lineTo(100,200);
        ctx.lineTo(120,200);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }

      function spin() {
        if (!spinning) return;
        angle += speed;
        speed *= 0.97;

        if (speed < 0.003) {
          spinning = false;
          const slice = (2 * Math.PI) / items.length;
          const idx = Math.floor(((2*Math.PI - (angle % (2*Math.PI))) / slice)) % items.length;
          resultEl.textContent = '🎯 결과: ' + items[idx];
          return;
        }

        draw();
        requestAnimationFrame(spin);
      }

      draw();
      spin();
    }
  </script>

</body>
</html>
